services:
  db:
    image: pgvector/pgvector:pg16
    container_name: knowledge_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: knowledge_search
      POSTGRES_USER: ks_admin
      POSTGRES_PASSWORD: ks_secret_2024
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ks_admin -d knowledge_search" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: knowledge_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://ks_admin:ks_secret_2024@db:5432/knowledge_search
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      - knowledge_data:/app/knowledge

  frontend:
    build:
      context: ./frontend
    container_name: knowledge_frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  knowledge_data:
